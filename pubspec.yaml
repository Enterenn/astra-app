name: astra_app
description: ASTRA — local-first health hub
publish_to: 'none'
version: 0.10.1+21

environment:
  sdk: ^3.12.0
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  sqflite: ^2.4.2+1
  path: ^1.9.1
  workmanager: ^0.9.0+3
  pedometer: ^4.2.0
  permission_handler: ^12.0.1
  flutter_local_notifications: ^21.0.0
  path_provider: ^2.1.5
  file_picker: 12.0.0-beta.5
  package_info_plus: ^10.1.0

  intl: ^0.20.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.4.0+3
  sqlite3: ^3.0.0

hooks:
  user_defines:
    sqlite3:
      # Windows tests/dev: use built-in winsqlite3.dll instead of copying
      # build/native_assets/windows/sqlite3.dll (avoids PathAccessException locks).
      source: system
      name_windows: winsqlite3

flutter:
  uses-material-design: false
  generate: true
  fonts:
    - family: Figtree
      fonts:
        - asset: assets/fonts/Figtree-VariableFont_wght.ttf
    - family: Darker Grotesque
      fonts:
        - asset: assets/fonts/DarkerGrotesque-VariableFont_wght.ttf
    - family: PhosphorRegular
      fonts:
        - asset: assets/fonts/Phosphor-Regular-subset.ttf
    - family: PhosphorFill
      fonts:
        - asset: assets/fonts/Phosphor-Fill-subset.ttf
